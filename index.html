<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="무코 영화 캘린더 - muko.kr 영화 일정">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="true">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="영화 캘린더">
<title>🎬 영화 캘린더</title>
<link rel="manifest" href="./manifest.json?v=1774767293050712900">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%230a0b0d' width='192' height='192'/><circle cx='96' cy='96' r='80' fill='%23f59e0b'/><text x='96' y='120' font-size='100' font-weight='bold' text-anchor='middle' fill='%23000'>🎬</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div style="font-size:13px;color:#999">데이터 불러오는 중...</div>
</div>

<div id="tab-movie" class="tab-panel active" style="display:block">
  <div class="movie-tab-header">
    <button class="month-nav-btn" onclick="changeMovieMonth(-1)">◀</button>
    <span class="movie-tab-title" id="movie-label">2026년 3월</span>
    <button class="month-nav-btn" onclick="changeMovieMonth(1)">▶</button>
  </div>
  <div id="movie-tag-filters"></div>
  <div id="movie-calendar-content"></div>
</div>

<script>
console.log('[초기화] 영화 캘린더 스크립트 로드됨');

const MONTHS=["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
const TAGS=[
  {id:"premiere",label:"시사회",color:"#a78bfa"},
  {id:"gv",label:"GV",color:"#f472b6"},
  {id:"screening",label:"상영회",color:"#06b6d4"},
  {id:"release",label:"개봉일",color:"#fb923c"},
  {id:"rerelease",label:"재개봉",color:"#3b82f6"},
  {id:"vip",label:"우대인사",color:"#10b981"},
  {id:"festival",label:"영화제",color:"#f59e0b"}
];

let y=2026, m=2, filters=new Set(), cache={};

async function getData(y,m){
  let k=y+"-"+String(m+1).padStart(2,"0");
  if(cache[k]) {
    console.log(`[캐시 히트] ${k} 데이터를 캐시에서 반환합니다.`);
    return cache[k];
  }

  try{
    console.log(`[데이터 요청] ${k}.json 파일 로드를 시도합니다.`);
    let r=await fetch(`data/movies/${k}.json`);

    if(!r.ok) throw new Error(`HTTP Error: ${r.status}`);

    cache[k]=await r.json();
    console.log(`[데이터 성공] ${k} 데이터를 불러왔습니다. 이벤트 수:`, cache[k].events.length);
    return cache[k];
  }catch(e){
    console.error(`[데이터 실패] ${k} 데이터를 불러오지 못했습니다:`, e);
    return {events:[]};
  }
}

function countByTag(events, tagId) {
  return events.filter(e => (e.tags || []).includes(tagId)).length;
}

function toggleMovieTagFilter(tagId, btn) {
  if(filters.has(tagId)) {
    filters.delete(tagId);
    btn.classList.remove("active");
  } else {
    filters.add(tagId);
    btn.classList.add("active");
  }
  render();
}

async function changeMovieMonth(d){
  console.log(`[월 변경] ${d > 0 ? '다음' : '이전'} 달로 이동`);
  m+=d;
  if(m<0){m=11;y--}
  if(m>11){m=0;y++}

  document.getElementById("loading").style.display="flex";
  await render();
}

async function render() {
  const container = document.getElementById("movie-calendar-content");
  const label = document.getElementById("movie-label");
  const filterContainer = document.getElementById("movie-tag-filters");
  const loading = document.getElementById("loading");

  try {
    label.innerText = `${y}년 ${MONTHS[m]}`;
    const data = await getData(y, m);
    const events = data.events || [];

    filterContainer.innerHTML = TAGS.map(tag => {
      const count = countByTag(events, tag.id);
      const isActive = filters.has(tag.id);
      return `
        <button class="movie-tag-filter-btn ${isActive ? 'active' : ''}"
                onclick="toggleMovieTagFilter('${tag.id}', this)"
                style="border-color: ${tag.color}">
          ${tag.label}
        </button>
      `;
    }).join('');

    const firstDay = new Date(y, m, 1).getDay();
    const lastDate = new Date(y, m + 1, 0).getDate();

    let html = `<div class="movie-cal-wrap"><div class="movie-cal-header">`;
    const days = ["일", "월", "화", "수", "목", "금", "토"];
    days.forEach(d => html += `<div class="movie-cal-dow">${d}</div>`);
    html += `</div><div class="movie-cells-row">`;

    for (let i = 0; i < firstDay; i++) {
      html += `<div class="movie-cell empty"></div>`;
    }

    for (let d = 1; d <= lastDate; d++) {
      const dailyEvents = events.filter(e => {
        if (e.date !== d) return false;
        if (filters.size === 0) return true;
        return (e.tags || []).some(t => filters.has(t));
      });

      html += `<div class="movie-cell">
        <div class="movie-cell-date">${String(d).padStart(2,'0')}</div>
        <div class="movie-cell-events">`;

      dailyEvents.forEach(e => {
        const tagInfo = TAGS.find(t => (e.tags || []).includes(t.id));
        const tagColor = tagInfo ? tagInfo.color : "#5c6478";
        if (e.href) {
          html += `<a href="${e.href}" target="_blank" class="movie-cell-event-link" style="border-left-color: ${tagColor}"><div class="movie-event-title">${e.title}</div></a>`;
        } else {
          html += `<div class="movie-cell-event" style="border-left-color: ${tagColor}"><div class="movie-event-title">${e.title}</div></div>`;
        }
      });

      html += `</div></div>`;
    }
    html += `</div></div>`;

    html += `<div class="movie-legend">`;
    TAGS.forEach(t => {
      html += `<div class="movie-legend-item"><span class="movie-legend-color" style="background-color:${t.color}"></span><span class="movie-legend-label">${t.label}</span></div>`;
    });
    html += `</div>`;

    container.innerHTML = html;
    console.log(`[렌더링 완료] ${y}년 ${MONTHS[m]}`);
  } catch (err) {
    container.innerHTML = `<div style="color:#f44; padding:20px; text-align:center;">데이터를 불러오는 중 오류가 발생했습니다.</div>`;
    console.error("[오류]", err);
  } finally {
    if (loading) loading.style.display = "none";
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// 초기 렌더링
// ─────────────────────────────────────────────────────────────────────────────
console.log('[초기화] render() 함수 실행');
render().then(() => {
  console.log('[초기화 완료] 영화 캘린더 초기 렌더링 완료');
}).catch(err => {
  console.error('[초기화 실패]', err);
});

// ─────────────────────────────────────────────────────────────────────────────
// 전역 함수 노출
// ─────────────────────────────────────────────────────────────────────────────
window.changeMovieMonth = changeMovieMonth;
window.render = render;
window.toggleMovieTagFilter = toggleMovieTagFilter;

// ─────────────────────────────────────────────────────────────────────────────
// PWA: Service Worker 등록
// ─────────────────────────────────────────────────────────────────────────────
let swRegistration = null;

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js')
      .then((registration) => {
        swRegistration = registration;
        console.log('[PWA] Service Worker 등록 성공:', registration);

        // 업데이트 확인
        registration.addEventListener('updatefound', () => {
          const newWorker = registration.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              console.log('[PWA] 새 버전 사용 가능');
              // 선택적: 사용자에게 업데이트 알림 표시 가능
            }
          });
        });
      })
      .catch((error) => {
        console.error('[PWA] Service Worker 등록 실패:', error);
      });
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// PWA: 설치 프롬프트 처리
// ─────────────────────────────────────────────────────────────────────────────
let installPromptEvent = null;

window.addEventListener('beforeinstallprompt', (e) => {
  installPromptEvent = e;
  console.log('[PWA] 설치 프롬프트 이벤트 감지됨');
});

window.addEventListener('appinstalled', () => {
  console.log('[PWA] 앱이 설치되었습니다');
  installPromptEvent = null;
});

// PWA 설치 프롬프트 표시 함수
window.showInstallPrompt = async () => {
  if (!installPromptEvent) {
    console.log('[PWA] 설치 프롬프트 사용 불가능');
    return false;
  }

  installPromptEvent.prompt();
  const { outcome } = await installPromptEvent.userChoice;
  console.log(`[PWA] 사용자 선택: ${outcome}`);
  installPromptEvent = null;
  return outcome === 'accepted';
};

// ─────────────────────────────────────────────────────────────────────────────
// PWA: 온라인/오프라인 상태 감시
// ─────────────────────────────────────────────────────────────────────────────
window.addEventListener('online', () => {
  console.log('[PWA] 온라인 연결됨');
  // 데이터 동기화 시작
  if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage({
      type: 'SYNC_DATA'
    });
  }
});

window.addEventListener('offline', () => {
  console.log('[PWA] 오프라인 상태');
});

// ─────────────────────────────────────────────────────────────────────────────
// PWA: 주기적 백그라운드 동기화 등록
// ─────────────────────────────────────────────────────────────────────────────
if ('periodicSync' in ServiceWorkerRegistration.prototype) {
  window.addEventListener('load', async () => {
    if (swRegistration) {
      try {
        await swRegistration.periodicSync.register('update-movie-data', {
          minInterval: 24 * 60 * 60 * 1000 // 24시간
        });
        console.log('[PWA] 주기적 동기화 등록됨');
      } catch (error) {
        console.log('[PWA] 주기적 동기화 등록 불가:', error);
      }
    }
  });
}

console.log('[PWA] PWA 스크립트 로드 완료');
</script>

</body>
</html>
