<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="무코 영화 캘린더">
<meta name="theme-color" content="#1a1a1a">
<title>🎬 영화 캘린더</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div style="font-size:13px;color:#999">데이터 불러오는 중...</div>
</div>

<div id="tab-movie" class="tab-panel active" style="display:block">
  <div class="movie-tab-header">
    <button class="month-nav-btn" onclick="changeMovieMonth(-1)">◀</button>
    <span class="movie-tab-title" id="movie-label">2026년 3월</span>
    <button class="month-nav-btn" onclick="changeMovieMonth(1)">▶</button>
  </div>
  <div id="movie-tag-filters"></div>
  <div id="movie-calendar-content"></div>
</div>

<script>
console.log('[초기화] 영화 캘린더 스크립트 로드됨');

const MONTHS=["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
const TAGS=[
  {id:"premiere",label:"시사회",color:"#a78bfa"},
  {id:"gv",label:"GV",color:"#f472b6"},
  {id:"screening",label:"상영회",color:"#06b6d4"},
  {id:"release",label:"개봉일",color:"#fb923c"},
  {id:"rerelease",label:"재개봉",color:"#3b82f6"},
  {id:"vip",label:"우대인사",color:"#10b981"},
  {id:"festival",label:"영화제",color:"#f59e0b"}
];

let y=2026, m=2, filters=new Set(), cache={};

function daysInMonth(y,m){
  return new Date(y,m+1,0).getDate();
}

async function getData(y,m){
  let k=y+"-"+String(m+1).padStart(2,"0");
  if(cache[k]) {
    console.log(`[캐시 히트] ${k} 데이터를 캐시에서 반환합니다.`);
    return cache[k];
  }

  try{
    console.log(`[데이터 요청] ${k}.json 파일 로드를 시도합니다.`);
    let r=await fetch(`data/movies/${k}.json`);

    if(!r.ok) throw new Error(`HTTP Error: ${r.status}`);

    cache[k]=await r.json();
    console.log(`[데이터 성공] ${k} 데이터를 불러왔습니다. 이벤트 수:`, cache[k].events.length);
    return cache[k];
  }catch(e){
    console.error(`[데이터 실패] ${k} 데이터를 불러오지 못했습니다:`, e);
    return {events:[]};
  }
}

function countByTag(events, tagId) {
  return events.filter(e => (e.tags || []).includes(tagId)).length;
}
function toggleMovieTagFilter(tagId, btn) {
  if(filters.has(tagId)) {
    filters.delete(tagId);
    btn.classList.remove("active");
  } else {
    filters.add(tagId);
    btn.classList.add("active");
  }
  render();
}

async function changeMovieMonth(d){
  console.log(`[월 변경] ${d > 0 ? '다음' : '이전'} 달로 이동`);
  m+=d;
  if(m<0){m=11;y--}
  if(m>11){m=0;y++}

  document.getElementById("loading").style.display="flex";
  await render();
}

async function render(){
  console.log(`[렌더링 시작] ${y}년 ${MONTHS[m]}`);

  try {
    document.getElementById("movie-label").textContent=y+"년 "+MONTHS[m];
    let d=await getData(y,m);
    let e=d.events||[];

    let filteredEvents = e;
    if(filters.size > 0) {
      filteredEvents = e.filter(evt => (evt.tags||[]).some(t => filters.has(t)));
    }

    console.log(`[이벤트 로드] 총 ${e.length}개, 필터된 ${filteredEvents.length}개`);

    let c=document.getElementById("movie-calendar-content");
    c.innerHTML="";

    // 정보 카드
    let infoCard = document.createElement("div");
    infoCard.className = "movie-info-card";
    infoCard.innerHTML = `
      <div class="movie-info-title">${y}년 ${MONTHS[m]} 영화</div>
      <div class="movie-info-stats">
        <div class="movie-stat">
          <span class="movie-stat-val">${filteredEvents.length}</span>
          <span class="movie-stat-lbl">개봉작</span>
        </div>
        <div class="movie-stat">
          <span class="movie-stat-val">${countByTag(filteredEvents, 'premiere')}</span>
          <span class="movie-stat-lbl">시사회</span>
        </div>
        <div class="movie-stat">
          <span class="movie-stat-val">${countByTag(filteredEvents, 'release')}</span>
          <span class="movie-stat-lbl">개봉일</span>
        </div>
      </div>
    `;
    c.appendChild(infoCard);

    // 캘린더 래퍼
    let calWrap = document.createElement("div");
    calWrap.className = "movie-cal-wrap";

    // 요일 헤더
    let hdr = document.createElement("div");
    hdr.className = "movie-cal-header";
    ["월","화","수","목","금","토","일"].forEach((lbl, i) => {
      let d = document.createElement("div");
      d.className = "movie-cal-dow" + (i===5?" sat":i===6?" sun":"");
      d.textContent = lbl;
      hdr.appendChild(d);
    });
    calWrap.appendChild(hdr);

    // 셀 행
    let cellsRow = document.createElement("div");
    cellsRow.className = "movie-cells-row";

    let firstDay = new Date(y,m,1).getDay();
    let startMonday = firstDay === 0 ? 6 : firstDay - 1;
    let daysCount = daysInMonth(y,m);

    // 이전 월 패딩
    for(let i = 0; i < startMonday; i++) {
      let cell = document.createElement("div");
      cell.className = "movie-cell empty";
      cellsRow.appendChild(cell);
    }

    // 현재 월 날짜
    for(let day = 1; day <= daysCount; day++) {
      let cell = document.createElement("div");
      cell.className = "movie-cell";

      let dayEvents = filteredEvents.filter(e => e.date === day);
      let dateStr = String(day).padStart(2,"0");

      let html = `<div class="movie-cell-date">${dateStr}</div>`;

      if(dayEvents.length > 0) {
        html += '<div class="movie-cell-events">';
        dayEvents.forEach(evt => {
          let tagsHtml = '';
          (evt.tags||[]).forEach(tag => {
            let tagInfo = TAGS.find(t => t.id === tag);
            if(tagInfo) {
              tagsHtml += `<span class="movie-tag" style="background-color:${tagInfo.color}20;color:${tagInfo.color}">${tagInfo.label}</span>`;
            }
          });

          let eventInner = `<div class="movie-event-title">${evt.title}</div><div class="movie-event-tags">${tagsHtml}</div>`;

          if(evt.href) {
            html += `<a href="${evt.href}" target="_blank" rel="noopener noreferrer" class="movie-cell-event-link">${eventInner}</a>`;
          } else {
            html += `<div class="movie-cell-event">${eventInner}</div>`;
          }
        });
        html += '</div>';
      }

      cell.innerHTML = html;
      cellsRow.appendChild(cell);
    }

    calWrap.appendChild(cellsRow);
    c.appendChild(calWrap);

    // 범례
    let legend = document.createElement("div");
    legend.className = "movie-legend";
    TAGS.forEach(tag => {
      let item = document.createElement("div");
      item.className = "movie-legend-item";
      item.innerHTML = `
        <span class="movie-legend-color" style="background-color:${tag.color}"></span>
        <span class="movie-legend-label">${tag.label}</span>
      `;
      legend.appendChild(item);
    });
    c.appendChild(legend);

    console.log(`[렌더링 완료] DOM 업데이트됨`);
  } catch(error) {
    console.error("[렌더링 에러]", error);
    document.getElementById("movie-calendar-content").innerHTML="<div style='padding:20px; text-align:center; color:#f44;'>❌ 오류 발생: "+error.message+"</div>";
  } finally {
    document.getElementById("loading").style.display="none";
    console.log("[로딩 오버레이 숨김 완료]");
  }
}

console.log('[초기화] render() 함수 실행');
render().then(() => {
  console.log('[초기화 완료] 영화 캘린더 초기 렌더링 완료');
}).catch(err => {
  console.error('[초기화 실패]', err);
});

window.changeMovieMonth = changeMovieMonth;
window.render = render;
</script>

</body>
</html>
