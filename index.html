<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="무코 영화 캘린더 - 영화 이벤트 필터링 및 상세정보">
<meta name="theme-color" content="#1a1a1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Movie Calendar">
<title>🎬 영화 캘린더</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--muted)">데이터 불러오는 중...</div>
</div>

<!-- 영화 탭 -->
<div id="tab-movie" class="tab-panel active" style="display: block;">
  <div class="movie-tab-header">
    <button class="month-nav-btn" onclick="changeMovieMonth(-1)">◀</button>
    <span class="movie-tab-title" id="movie-label">2026년 3월</span>
    <button class="month-nav-btn" onclick="changeMovieMonth(1)">▶</button>
    <button class="movie-refresh-btn" id="movie-refresh-btn" onclick="startMovieCrawl()" title="muko.kr에서 최신 영화 데이터 자동 크롤링">🔄 새로고침</button>
  </div>
  <div id="movie-tag-filters" class="movie-tag-filters"></div>
  <div id="movie-calendar-content" class="movie-calendar-content"></div>
</div>

<script src="config.js"></script>
<script src="data.js"></script>
<script src="render-movie.js"></script>
<script>
  // 초기화
  renderMovie();
</script>

</body>
</html>
