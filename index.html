<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영화 캘린더</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="loading-overlay" id="loading"><div class="spinner"></div></div>
<div id="tab-movie" class="tab-panel" style="display:block">
<div class="movie-tab-header">
<button onclick="changeMovieMonth(-1)">◀</button>
<span id="movie-label">2026년 3월</span>
<button onclick="changeMovieMonth(1)">▶</button>
</div>
<div id="movie-tag-filters"></div>
<div id="movie-calendar-content"></div>
</div>
<script>
const MONTHS=["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
const TAGS=[{id:"premiere",label:"시사회",color:"#a78bfa"},{id:"gv",label:"GV",color:"#f472b6"}];
let y=2026,m=2,filters=new Set(),cache={};
async function getData(y,m){
  let k=y+"-"+String(m+1).padStart(2,"0");
  if(cache[k])return cache[k];
  try{
    let r=await fetch("./data/movies/"+k+".json");
    cache[k]=await r.json();
    return cache[k];
  }catch(e){
    return {events:[]};
  }
}
async function changeMovieMonth(d){m+=d;if(m<0){m=11;y--}if(m>11){m=0;y++}await render()}
async function render(){
  document.getElementById("movie-label").textContent=y+"년 "+MONTHS[m];
  let d=await getData(y,m);
  let e=d.events||[];
  let c=document.getElementById("movie-calendar-content");
  c.innerHTML="<p>"+e.length+" 이벤트 로드됨</p>";
  document.getElementById("loading").style.display="none";
}
render();
</script>
</body>
</html>
